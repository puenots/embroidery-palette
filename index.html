<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刺繍糸15色（無印準拠）</title>
<style>
  :root { font-family: -apple-system, "Hiragino Sans", "Helvetica Neue", sans-serif; }
  body { margin: 0; background: #fafafa; color: #1a1a1a; padding: 32px; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #666; font-size: 13px; margin: 0 0 24px; }
  .grid { display: flex; flex-direction: column; max-width: 560px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
  .row { display: flex; align-items: center; height: 46px; }
  .sw { width: 46px; align-self: stretch; flex: 0 0 46px; }
  .num { width: 34px; text-align: center; color: #999; font-size: 12px; font-variant-numeric: tabular-nums; }
  .name { flex: 1; padding-left: 12px; font-size: 14px; font-weight: 600; }
  .role { flex: 1.4; color: #777; font-size: 12px; }
  .hex { font-family: "SF Mono", Menlo, monospace; font-size: 12px; color: #555; padding-right: 14px; text-transform: uppercase; }
  .tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-left: 6px; vertical-align: middle; }
  .tag-metal { background: linear-gradient(135deg,#e9c46a,#fff3c0,#d4af37); color: #6b4e00; }
  .legend { margin-top: 18px; font-size: 12px; color: #666; line-height: 1.7; }
  .legend b { color: #1a1a1a; }
</style>
</head>
<body>
  <h1>刺繍糸 15色 — 無印良品 準拠</h1>
  <p class="sub">無印のラインナップ・並び順をそのまま採用（並び＝おおむね需要順）。グレー/紫/シアン等は無印が不採用なので外し、ベージュ・エンジ・金・銀を採用。</p>

  <p class="sub" style="margin-top:18px;font-weight:600;color:#1a1a1a;">確定 15色（無印と同一）</p>
  <div class="grid" id="grid"></div>

  <div class="legend">
    <span class="tag tag-metal">メタリック</span> 他色で再現不可・装飾の華<br>
    <b>無印に無くて今回外した色:</b> グレー / 肌タン(→ベージュで代替) / 橙以外の暖色アクセント / 紫 / 深緑(→みどり) / 濃い青(→あお) / 蛍光ライム(→きみどり)<br>
    <b>注意:</b> きみどり は標準的な黄緑で、テニスボール等の<b>蛍光ライムではない</b>。蛍光が要るなら1色だけ差し替え要検討。
  </div>

<script>
  const GOLD   = "linear-gradient(135deg,#a67c00 0%,#ffd75e 24%,#c8a028 50%,#fff0a8 70%,#9c7a12 100%)";
  const SILVER = "linear-gradient(135deg,#8e9192 0%,#ffffff 28%,#c4c7c8 52%,#eaecee 72%,#9aa0a1 100%)";
  // 無印の並び順（左上→右下）をそのまま 1〜15
  const colors = [
    { n:"ピンク",   hex:"EA8FAD", role:"花・頬・差し色" },
    { n:"あか",     hex:"E50012", role:"赤系全般" },
    { n:"だいだい", hex:"EF7E00", role:"果実・夕日・橙" },
    { n:"きいろ",   hex:"F2D200", role:"花・光・食べ物" },
    { n:"きみどり", hex:"95C11F", role:"若葉・草・黄緑" },
    { n:"みどり",   hex:"009A44", role:"葉・常緑" },
    { n:"みずいろ", hex:"45BCC4", role:"空・水・水色" },
    { n:"あお",     hex:"1B2A6B", role:"青系全般・海・夜" },
    { n:"くろ",     hex:"000000", role:"輪郭・最暗部" },
    { n:"エンジ",   hex:"97233F", role:"落ち着いた赤・ヴィンテージ" },
    { n:"茶",       hex:"8A4B1A", role:"髪・木・動物" },
    { n:"ベージュ", hex:"D2B58B", role:"肌・木・生成り・薄茶" },
    { n:"金",       hex:"C8A028", role:"エンブレム・星・装飾文字", tag:"metal", metal:GOLD },
    { n:"銀",       hex:"BCBEC0", role:"金属・銀・グレー役・装飾", tag:"metal", metal:SILVER },
    { n:"しろ",     hex:"FFFFFF", role:"ハイライト・白地" },
  ];
  const tagHtml = t => t==="metal" ? '<span class="tag tag-metal">メタリック</span>' : '';
  const rowHtml = (c,i) => `
    <div class="row">
      <div class="sw" style="background:${c.metal || '#'+c.hex}"></div>
      <div class="num">${String(i+1).padStart(2,'0')}</div>
      <div class="name">${c.n}${tagHtml(c.tag)}</div>
      <div class="role">${c.role}</div>
      <div class="hex">#${c.hex}</div>
    </div>`;
  document.getElementById('grid').innerHTML = colors.map((c,i)=>rowHtml(c,i)).join('');
</script>
</body>
</html>
